name: Sentry Autofix

on:
  repository_dispatch:
    types: [sentry-error]

jobs:
  autofix:
    name: Claude Autofix
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Claude analyzes and fixes
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');
            const path = require('path');

            const errorType    = '${{ github.event.client_payload.error_type }}';
            const errorMessage = '${{ github.event.client_payload.error_message }}';
            const culprit      = '${{ github.event.client_payload.culprit }}';
            const permalink    = '${{ github.event.client_payload.permalink }}';
            const title        = '${{ github.event.client_payload.title }}';

            // Resolve the likely source file from culprit (e.g. "src/app/chat/page.tsx")
            let fileContent = '';
            let filePath = '';
            const culpritFile = culprit.split(' ')[0].split('?')[0];
            const candidates = [
              culpritFile,
              'src/' + culpritFile,
              'src/app/' + culpritFile,
            ];
            for (const c of candidates) {
              if (fs.existsSync(c)) { filePath = c; break; }
            }
            if (filePath) fileContent = fs.readFileSync(filePath, 'utf8').slice(0, 8000);

            // Ask Claude to generate a fix
            const res = await fetch('https://api.anthropic.com/v1/messages', {
              method: 'POST',
              headers: {
                'x-api-key': process.env.ANTHROPIC_API_KEY,
                'anthropic-version': '2023-06-01',
                'content-type': 'application/json',
              },
              body: JSON.stringify({
                model: 'claude-sonnet-4-6',
                max_tokens: 2048,
                messages: [{
                  role: 'user',
                  content: `Sei un senior engineer. Analizza questo errore Sentry e proponi un fix minimale.

Errore: ${errorType}: ${errorMessage}
Culprit: ${culprit}
${filePath ? `\nFile (${filePath}):\n\`\`\`typescript\n${fileContent}\n\`\`\`` : ''}

Rispondi SOLO con JSON:
{
  "can_fix": true/false,
  "reason": "spiegazione breve",
  "file": "path/del/file",
  "original": "codice da sostituire (stringa esatta)",
  "fixed": "codice corretto"
}
Se non puoi fixare in sicurezza, can_fix: false.`,
                }],
              }),
            });

            const data = await res.json();
            const text = data?.content?.[0]?.text ?? '';

            let fix;
            try {
              fix = JSON.parse(text.match(/\{[\s\S]*\}/)?.[0] ?? '{}');
            } catch { fix = { can_fix: false }; }

            if (!fix.can_fix) {
              console.log('Claude: cannot fix safely —', fix.reason);
              // Open a Linear-style issue comment instead
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[Sentry] ${title}`,
                body: `**Errore:** ${errorType}: ${errorMessage}\n**Culprit:** ${culprit}\n**Sentry:** ${permalink}\n\n**Claude:** ${fix.reason ?? 'Richiede analisi manuale.'}\n\n---\n🤖 Sentry Autofix`,
                labels: ['bug', 'sentry'],
              });
              return;
            }

            // Apply fix
            const fileToFix = fix.file;
            if (!fs.existsSync(fileToFix)) {
              console.log('File not found:', fileToFix);
              return;
            }
            const src = fs.readFileSync(fileToFix, 'utf8');
            if (!src.includes(fix.original)) {
              console.log('Original snippet not found in file');
              return;
            }
            fs.writeFileSync(fileToFix, src.replace(fix.original, fix.fixed));

            // Commit and open PR
            const branch = `autofix/sentry-${Date.now()}`;
            execSync(`git config user.email "autofix@normaai.it"`);
            execSync(`git config user.name "NormaAI Autofix"`);
            execSync(`git checkout -b ${branch}`);
            execSync(`git add ${fileToFix}`);
            execSync(`git commit -m "fix: autofix Sentry error — ${errorType} in ${fileToFix}"`);
            execSync(`git push origin ${branch}`);

            await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `fix: [Sentry autofix] ${title}`,
              head: branch,
              base: 'main',
              body: `### 🤖 Sentry Autofix\n\n**Errore:** \`${errorType}: ${errorMessage}\`\n**Culprit:** \`${culprit}\`\n**Sentry:** ${permalink}\n\n**Fix:** ${fix.reason}\n\n---\n*Generato automaticamente da Claude Sonnet 4.6*`,
            });
            console.log('PR created for branch', branch);
