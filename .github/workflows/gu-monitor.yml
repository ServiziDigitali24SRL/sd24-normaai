# SER-85: Monitor Gazzetta Ufficiale — corpus versioning automatico
# Controlla quotidianamente la GU per nuove pubblicazioni rilevanti per NormaAI
name: GU Monitor

on:
  schedule:
    # Ogni giorno alle 07:00 UTC (09:00 ora italiana)
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (nessuna scrittura in DB)"
        type: boolean
        default: false
      from_date:
        description: "Data da cui monitorare (YYYY-MM-DD)"
        required: false
      invalidate_cache:
        description: "Invalida cache semantica se trovate nuove norme"
        type: boolean
        default: true

jobs:
  monitor:
    name: GU Monitor + Corpus Update
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run GU Monitor
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CORPUS_WEBHOOK_URL: ${{ secrets.CORPUS_WEBHOOK_URL }}
          CORPUS_WEBHOOK_SECRET: ${{ secrets.CORPUS_WEBHOOK_SECRET }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          NORMAAI_CORPUS_VERSION: ${{ vars.NORMAAI_CORPUS_VERSION }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ github.event.inputs.from_date }}" ]; then
            ARGS="$ARGS --from ${{ github.event.inputs.from_date }}"
          fi
          if [ "${{ github.event.inputs.invalidate_cache }}" = "true" ]; then
            ARGS="$ARGS --invalidate-cache"
          fi
          npx tsx scripts/gu-monitor/monitor.ts $ARGS

      - name: Post summary
        if: always()
        run: |
          echo "## 📰 GU Monitor — $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "Controlla il log del job per i dettagli sulle pubblicazioni rilevate." >> $GITHUB_STEP_SUMMARY
