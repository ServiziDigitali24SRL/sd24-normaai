# SER-66: Bundle secret leak audit
# Scansiona il bundle Next.js compilato per segreti JWT/API key accidentalmente esposti.
# Blocca il merge se trovati pattern eyJ*, sk-ant-*, sk_live_*, ecc.
name: Secret Leak Audit

on:
  push:
    branches: [main, light-theme, feat/hardening-ser-65-98]
  pull_request:
    branches: [main, light-theme]

jobs:
  secret-audit:
    name: SER-66 Bundle Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Build con variabili d'ambiente sicure (nessun segreto reale)
      # Il punto è verificare che il bundle non contenga segreti iniettati accidentalmente
      - name: Build Next.js
        env:
          # Variabili pubbliche (OK in bundle)
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          # Variabili server-only (NON devono apparire nel bundle)
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          PII_ENCRYPTION_KEY: ${{ secrets.PII_ENCRYPTION_KEY }}
          CORPUS_WEBHOOK_SECRET: ${{ secrets.CORPUS_WEBHOOK_SECRET }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          # Necessarie per build (non segreti)
          NORMAAI_CORPUS_VERSION: ${{ vars.NORMAAI_CORPUS_VERSION || 'v1' }}
          SEMANTIC_CACHE_ENABLED: "false"
          NODE_ENV: production
        run: npm run build

      - name: Run secret leak audit
        run: |
          chmod +x scripts/sec-audit/check-bundle-secrets.sh
          BUILD_DIR=.next bash scripts/sec-audit/check-bundle-secrets.sh

      - name: Upload audit report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bundle-secrets-report
          path: /tmp/bundle-secrets-report.txt
          retention-days: 7

      - name: Post summary (success)
        if: success()
        run: |
          echo "## ✅ SER-66 Bundle Secret Audit — OK" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Nessun segreto trovato nel bundle \`.next/\`. Build sicura." >> $GITHUB_STEP_SUMMARY
