name: Security Review

# Static analysis + dependency audit + secret scanning.
# Inspirato dal Trail of Bits Testing Handbook (https://appsec.guide/).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Lunedì alle 06:00 UTC — pickup nuove CVE pubblicate nel weekend
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # upload SARIF al Security tab

jobs:
  semgrep:
    name: Semgrep (ToB-style ruleset)
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        run: |
          semgrep ci \
            --config auto \
            --config p/security-audit \
            --config p/typescript \
            --config p/react \
            --config p/nextjs \
            --config p/javascript \
            --config p/owasp-top-ten \
            --config p/jwt \
            --config p/sql-injection \
            --config p/xss \
            --config p/command-injection \
            --config p/insecure-transport \
            --config p/secrets \
            --severity ERROR --severity WARNING \
            --exclude node_modules --exclude .next --exclude public \
            --sarif --output semgrep.sarif || true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  codeql:
    name: CodeQL (JS/TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality
      - uses: github/codeql-action/analyze@v3
        with:
          category: codeql

  npm-audit:
    name: npm audit (production deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Audit
        # Fail solo su HIGH/CRITICAL — moderate sono tracciate ma non bloccanti
        run: npm audit --omit=dev --audit-level=high

  gitleaks:
    name: Gitleaks (secret scan, full history)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Allowlist: chiave pubblica Vapi e STORAGE_KEY costante (false positive noti)
          GITLEAKS_CONFIG: .github/gitleaks.toml

  trivy-fs:
    name: Trivy (filesystem + IaC misconfig)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          skip-dirs: node_modules,.next,public
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy.sarif
          category: trivy
