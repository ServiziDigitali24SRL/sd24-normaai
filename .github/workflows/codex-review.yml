name: Codex PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  codex-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Codex review
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          script: |
            const { execSync } = require('child_process');

            // Get diff
            execSync('git fetch origin ' + context.payload.pull_request.base.ref);
            let diff = '';
            try {
              diff = execSync(
                'git diff origin/' + context.payload.pull_request.base.ref + '...HEAD -- "*.ts" "*.tsx" "*.js" "*.jsx" "*.css"',
                { maxBuffer: 10 * 1024 * 1024 }
              ).toString().slice(0, 12000);
            } catch (e) {
              diff = e.stdout ? e.stdout.toString().slice(0, 12000) : '';
            }

            if (!diff.trim()) {
              console.log('No diff found, skipping review');
              return;
            }

            // Call OpenAI
            const res = await fetch('https://api.openai.com/v1/chat/completions', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + process.env.OPENAI_API_KEY,
              },
              body: JSON.stringify({
                model: 'gpt-4.1',
                max_tokens: 1024,
                messages: [
                  {
                    role: 'system',
                    content: 'Sei un senior engineer che fa code review per NormaAI, un SaaS normativo italiano in Next.js 14 + TypeScript + Supabase. Rispondi in italiano. Sii conciso e diretto: elenca solo problemi reali (bug, sicurezza, performance, accessibilità). Se il codice è OK scrivi solo ✅ LGTM. Niente complimenti generici.',
                  },
                  {
                    role: 'user',
                    content: `PR: ${context.payload.pull_request.title}\n\nDiff:\n\`\`\`\n${diff}\n\`\`\``,
                  },
                ],
              }),
            });

            const data = await res.json();
            const review = data?.choices?.[0]?.message?.content
              || ('Errore API: ' + JSON.stringify(data?.error));

            // Post comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### 🤖 Codex Review\n\n${review}\n\n---\n*Model: gpt-4.1 · [workflow](/.github/workflows/codex-review.yml)*`,
            });
