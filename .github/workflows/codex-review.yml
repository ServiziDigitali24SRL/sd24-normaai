name: Codex PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  codex-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin ${{ github.base_ref }}
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD -- '*.ts' '*.tsx' '*.js' '*.jsx' '*.css' | head -c 12000)
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Codex review
        id: review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          DIFF="${{ steps.diff.outputs.diff }}"

          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d "$(jq -n \
              --arg title "$PR_TITLE" \
              --arg diff "$DIFF" \
              '{
                model: "gpt-4.1",
                max_tokens: 1024,
                messages: [
                  {
                    role: "system",
                    content: "Sei un senior engineer che fa code review per NormaAI, un SaaS normativo italiano in Next.js 14 + TypeScript + Supabase. Rispondi in italiano. Sii conciso e diretto: elenca solo problemi reali (bug, sicurezza, performance, accessibilità). Se il codice è OK scrivi solo ✅ LGTM. Niente complimenti generici."
                  },
                  {
                    role: "user",
                    content: ("PR: " + $title + "\n\nDiff:\n```\n" + $diff + "\n```")
                  }
                ]
              }'
            )")

          REVIEW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "Errore nella review: " + .error.message')
          echo "review<<EOF" >> $GITHUB_OUTPUT
          echo "$REVIEW" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const review = `${{ steps.review.outputs.review }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### 🤖 Codex Review\n\n${review}\n\n---\n*Model: gpt-4.1 · [workflow](/.github/workflows/codex-review.yml)*`
            });
