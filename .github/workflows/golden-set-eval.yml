# SER-82: Golden Set LLM-judge evaluation — settimanale + on-demand
name: Golden Set Eval

on:
  schedule:
    # Ogni lunedì alle 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      limit:
        description: "Numero di query (vuoto = tutte)"
        required: false
        default: ""
      threshold:
        description: "Pass threshold (default 0.70)"
        required: false
        default: "0.70"

jobs:
  llm-judge:
    name: LLM-Judge Evaluation
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run LLM-judge eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NORMAAI_URL: https://normaai.it
          NORMAAI_EVAL_API_KEY: ${{ secrets.NORMAAI_EVAL_API_KEY }}
          EVAL_PASS_THRESHOLD: ${{ github.event.inputs.threshold || '0.70' }}
        run: |
          LIMIT_ARG=""
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            LIMIT_ARG="--limit ${{ github.event.inputs.limit }}"
          fi
          npx tsx scripts/golden-set-eval/llm-judge.ts $LIMIT_ARG --output eval-report.json

      - name: Upload eval report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-report-${{ github.run_number }}
          path: eval-report.json
          retention-days: 90

      - name: Post summary to GitHub Step Summary
        if: always()
        run: |
          echo "## 📊 NormaAI Golden Set Eval" >> $GITHUB_STEP_SUMMARY
          if [ -f eval-report.json ]; then
            PASS_RATE=$(cat eval-report.json | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); console.log((d.pass_rate*100).toFixed(1)+'%')")
            AVG_SCORE=$(cat eval-report.json | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); console.log(d.avg_score.toFixed(3))")
            CI_PASSED=$(cat eval-report.json | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); console.log(d.ci_passed ? '✅ PASSED' : '❌ FAILED')")
            echo "| Metrica | Valore |" >> $GITHUB_STEP_SUMMARY
            echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
            echo "| Pass rate | $PASS_RATE |" >> $GITHUB_STEP_SUMMARY
            echo "| Score medio | $AVG_SCORE |" >> $GITHUB_STEP_SUMMARY
            echo "| Risultato CI | $CI_PASSED |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Golden Set eval failed — score medio sotto soglia. Controlla eval-report.json per i dettagli."
