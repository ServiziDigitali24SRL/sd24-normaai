name: RAG Smoke Test

on:
  push:
    branches:
      - light-theme
    paths:
      - "src/app/api/chat/route.ts"
      - "src/app/api/chat/system-prompts.ts"
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx

      - name: Deploy to Vercel production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npm install -g vercel --silent
          vercel --prod --yes --token "$VERCEL_TOKEN" 2>&1 | tail -5
          echo "Waiting 15s for edge propagation..."
          sleep 15

      - name: Run RAG smoke test
        env:
          SMOKE_KEY: ${{ secrets.SMOKE_KEY }}
        run: python scripts/smoke-test-rag.py
