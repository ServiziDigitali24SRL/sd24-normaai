name: RAG Smoke Test

on:
  push:
    branches:
      - light-theme
    paths:
      - "src/app/api/chat/route.ts"
      - "src/app/api/chat/system-prompts.ts"
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx

      - name: Wait for Vercel production deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          echo "Waiting for Vercel to deploy..."
          for i in $(seq 1 20); do
            STATE=$(curl -s "https://api.vercel.com/v13/deployments?projectId=normaai-app&teamId=team_OkFdfLJm51it2v17oR787LR5&limit=1&target=production" \
              -H "Authorization: Bearer $VERCEL_TOKEN" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['deployments'][0]['state'])" 2>/dev/null || echo "unknown")
            echo "  Attempt $i: state=$STATE"
            if [ "$STATE" = "READY" ]; then
              echo "Deploy READY. Sleeping 10s for edge propagation..."
              sleep 10
              break
            fi
            sleep 15
          done

      - name: Run RAG smoke test
        env:
          SMOKE_KEY: ${{ secrets.SMOKE_KEY }}
        run: python scripts/smoke-test-rag.py
