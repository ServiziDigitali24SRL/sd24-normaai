version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      # Voice SDK — pinned esatto, MAI aggiornare automaticamente
      - dependency-name: "@vapi-ai/web"
        versions: [">= 0"]
      - dependency-name: "@daily-co/daily-js"
        versions: [">= 0"]
