# Gitleaks config — allowlist per false positive noti
# https://github.com/gitleaks/gitleaks#configuration

[extend]
useDefault = true

[allowlist]
description = "False positive noti già verificati dal team SD24"
paths = [
  '''package-lock\.json''',
]
regexes = [
  # Vapi PUBLIC key (intentional client-side, vedi src/hooks/useMobileVoice.ts)
  '''VAPI_PUBLIC_KEY\s*=\s*"1fe0aa87-b7a0-4394-b877-d846fa06035d"''',
  '''VAPI_ASSISTANT_ID\s*=\s*"e4cb1d2b-5afa-440c-94e7-51380cdc1f4a"''',
  # localStorage key constant (non è un secret)
  '''STORAGE_KEY\s*=\s*"norma-ruixen-v\d+"''',
]
