<svg viewBox="0 0 960 560" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f1b2d"/>
      <stop offset="1" stop-color="#0a1422"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#c9a227"/>
    </marker>
    <marker id="arrowL" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto-start-reverse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5bb3a6"/>
    </marker>
  </defs>

  <rect width="960" height="560" rx="18" fill="url(#bg)"/>

  <!-- Title -->
  <text x="480" y="46" text-anchor="middle" fill="#ffffff" font-size="26" font-weight="700">NormaAI · marketplace legale a due lati</text>
  <text x="480" y="72" text-anchor="middle" fill="#8fa3bd" font-size="14">Gratis per chi chiede · redditizio per chi assiste</text>

  <!-- Column headers -->
  <text x="155" y="118" text-anchor="middle" fill="#5bb3a6" font-size="15" font-weight="700">CITTADINO</text>
  <text x="480" y="118" text-anchor="middle" fill="#c9a227" font-size="15" font-weight="700">NORMA AI</text>
  <text x="805" y="118" text-anchor="middle" fill="#7aa7ff" font-size="15" font-weight="700">AVVOCATO</text>

  <!-- Center engine -->
  <rect x="360" y="140" width="240" height="120" rx="14" fill="#13243b" stroke="#c9a227" stroke-width="1.5"/>
  <text x="480" y="172" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">Agente vocale AI</text>
  <text x="480" y="196" text-anchor="middle" fill="#8fa3bd" font-size="12">RAG ibrido · &gt;1M documenti</text>
  <text x="480" y="214" text-anchor="middle" fill="#8fa3bd" font-size="12">8,8M chunk · fonti citate</text>
  <text x="480" y="240" text-anchor="middle" fill="#5bb3a6" font-size="12" font-weight="700">risposta gratuita a tutti</text>

  <!-- Citizen nodes -->
  <rect x="40" y="150" width="230" height="46" rx="10" fill="#13243b" stroke="#2a3f5c"/>
  <text x="155" y="178" text-anchor="middle" fill="#e6edf5" font-size="13">fa una domanda legale</text>

  <rect x="40" y="300" width="230" height="58" rx="10" fill="#13243b" stroke="#2a3f5c"/>
  <text x="155" y="325" text-anchor="middle" fill="#e6edf5" font-size="13">serve un avvocato?</text>
  <text x="155" y="345" text-anchor="middle" fill="#c9a227" font-size="13" font-weight="700">paga 9 € e finalizza</text>

  <rect x="40" y="430" width="230" height="62" rx="10" fill="#13243b" stroke="#2a3f5c"/>
  <text x="155" y="455" text-anchor="middle" fill="#e6edf5" font-size="13">riceve fino a 4 pareri</text>
  <text x="155" y="475" text-anchor="middle" fill="#5bb3a6" font-size="13" font-weight="700">sceglie il suo avvocato</text>

  <!-- Lawyer nodes -->
  <rect x="690" y="150" width="230" height="46" rx="10" fill="#13243b" stroke="#2a3f5c"/>
  <text x="805" y="178" text-anchor="middle" fill="#e6edf5" font-size="13">sfoglia i casi (swipe)</text>

  <rect x="690" y="300" width="230" height="58" rx="10" fill="#13243b" stroke="#2a3f5c"/>
  <text x="805" y="325" text-anchor="middle" fill="#e6edf5" font-size="13">PDF anonimizzato</text>
  <text x="805" y="345" text-anchor="middle" fill="#c9a227" font-size="13" font-weight="700">compra il lead · 91 €</text>

  <rect x="690" y="430" width="230" height="62" rx="10" fill="#13243b" stroke="#2a3f5c"/>
  <text x="805" y="455" text-anchor="middle" fill="#e6edf5" font-size="13">stesso lead venduto</text>
  <text x="805" y="475" text-anchor="middle" fill="#7aa7ff" font-size="13" font-weight="700">fino a 4 volte</text>

  <!-- Arrows citizen -> engine -->
  <path d="M270 173 L356 195" fill="none" stroke="#5bb3a6" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- engine -> citizen (free answer) -->
  <path d="M360 224 L272 318" fill="none" stroke="#5bb3a6" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text x="300" y="270" text-anchor="middle" fill="#5bb3a6" font-size="11">gratis</text>

  <!-- citizen pays -> engine generates pdf -->
  <path d="M270 329 L356 232" fill="none" stroke="#c9a227" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- engine -> lawyer (pdf) -->
  <path d="M600 200 L688 320" fill="none" stroke="#c9a227" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- lawyer swipe context -->
  <path d="M688 173 L602 195" fill="none" stroke="#7aa7ff" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- lawyer pays -> pareri -> citizen -->
  <path d="M805 358 L805 426" fill="none" stroke="#7aa7ff" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M690 461 L272 461" fill="none" stroke="#5bb3a6" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="480" y="452" text-anchor="middle" fill="#8fa3bd" font-size="11">fino a 4 call / video-call</text>

  <!-- Economics bar -->
  <rect x="280" y="500" width="400" height="40" rx="10" fill="#1a2c47" stroke="#c9a227" stroke-width="1.2"/>
  <text x="480" y="525" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">Ricavo per lead: fino a 373 € &#160;&#160;(9 € + 4 × 91 €)</text>
</svg>
